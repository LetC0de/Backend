<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain-overlay"></div>

    <nav class="nav">
        <a href="index.html" class="back-link">← BACK TO FEED</a>
        <h1 class="logo">CREATE</h1>
    </nav>

    <main class="container create-container">
        <form id="createPostForm" class="create-form">
            <div class="form-section">
                <label class="form-label">IMAGE</label>

                <div class="image-upload-area" id="imageUploadArea">
                    <input type="file" id="imageInput" accept="image/*" required>
                    <div class="upload-placeholder" id="uploadPlaceholder">
                        <div class="upload-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                        </div>
                        <p class="upload-text">CLICK TO SELECT IMAGE</p>
                        <p class="upload-subtext">JPG, PNG, GIF up to 10MB</p>
                    </div>
                    <div class="image-preview" id="imagePreview" style="display: none;">
                        <img id="previewImg" src="" alt="Preview">
                        <button type="button" class="remove-image" id="removeImage">×</button>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <label for="captionInput" class="form-label">CAPTION</label>
                <textarea
                    id="captionInput"
                    name="caption"
                    rows="4"
                    placeholder="Write your caption here..."
                    maxlength="500"
                    required
                ></textarea>
                <div class="char-count">
                    <span id="charCount">0</span> / 500
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="btn-text">PUBLISH POST</span>
                <span class="btn-loader" style="display: none;">
                    <div class="spinner"></div>
                </span>
            </button>
        </form>

        <div class="success-message" id="successMessage" style="display: none;">
            <div class="success-icon">✓</div>
            <h3>POST PUBLISHED</h3>
            <p>Your post has been shared successfully</p>
            <a href="index.html" class="view-feed-btn">VIEW FEED</a>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        initCreatePage();
    </script>
</body>
</html>
